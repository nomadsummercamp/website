    <script>
        // --- Hamburger Menu Toggle ---
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const hamburgerIcon = document.getElementById('hamburger-icon');
        const closeIcon = document.getElementById('close-icon');

        hamburgerBtn.addEventListener('click', () => {
            const isOpen = !mobileMenu.classList.contains('hidden');
            mobileMenu.classList.toggle('hidden');
            hamburgerIcon.classList.toggle('hidden', !isOpen);
            closeIcon.classList.toggle('hidden', isOpen);
        });

        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('hidden');
                hamburgerIcon.classList.remove('hidden');
                closeIcon.classList.add('hidden');
            });
        });
    
        // Nav spacer & scroll-hide on mobile
        const main_nav = document.getElementById('main-nav');
        const navSpacer = document.getElementById('nav-spacer');
        function syncSpacer() { navSpacer.style.height = main_nav.offsetHeight + 'px'; }
        syncSpacer();
        window.addEventListener('resize', syncSpacer);

        let lastScrollY = window.scrollY;
        window.addEventListener('scroll', () => {
            if (window.innerWidth >= 768) { main_nav.style.transform = ''; return; }
            const y = window.scrollY;
            if (y > lastScrollY && y > main_nav.offsetHeight) {
                main_nav.style.transform = 'translateY(-100%)';
            } else {
                main_nav.style.transform = 'translateY(0)';
            }
            lastScrollY = y;
        }, { passive: true });
</script>
